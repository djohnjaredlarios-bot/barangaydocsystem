<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Local Dashboard and Document Request System - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=asset_version) }}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: min(100%, 420px);
            max-width: 420px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header h1 {
            color: #8B0000;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .login-form .btn {
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 1.25rem;
                justify-content: flex-start;
                align-items: flex-start;
            }

            .login-container {
                margin-top: 2rem;
                padding: 1.5rem;
                box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            }

            .login-header h1 {
                font-size: 1.65rem;
            }

            .login-header p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Barangay Local Dashboard</h1>
            <p>Document Request & Appointment Management</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js', v=asset_version) }}"></script>
</body>
</html>
